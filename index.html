  <script>
    /* ── Contact modal ── */
    function openContact()  { document.getElementById('contactModal').classList.add('open'); }
    function closeContact() { document.getElementById('contactModal').classList.remove('open'); }
    function closeContactOutside(e) { if (e.target===document.getElementById('contactModal')) closeContact(); }
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeContact(); });

    /* ── Storage keys ── */
    const POS_KEY = 'suntree_pos_v2';
    const IMG_KEY = 'suntree_img_v2';

    /* ── Clamp helper ── */
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    /* ── Replace icon graphic ── */
    function applyCustomImage(item, dataUrl) {
      const existing = item.querySelector('svg, img.custom-icon');
      const img = document.createElement('img');
      img.src = dataUrl;
      img.className = 'custom-icon';
      if (existing) existing.replaceWith(img);
      else item.prepend(img);
    }

    /* ── Persist icon position as % of canvas ── */
    function savePos(item) {
      const canvas = document.querySelector('.canvas');
      const cr = canvas.getBoundingClientRect();
      const ir = item.getBoundingClientRect();
      const left = ((ir.left - cr.left) / canvas.offsetWidth  * 100).toFixed(3) + '%';
      const top  = ((ir.top  - cr.top)  / canvas.offsetHeight * 100).toFixed(3) + '%';
      try {
        const d = JSON.parse(localStorage.getItem(POS_KEY) || '{}');
        d[item.dataset.id] = { left, top };
        localStorage.setItem(POS_KEY, JSON.stringify(d));
      } catch(_) {}
    }

    /* ── Restore saved positions ── */
    function loadPositions() {
      let d;
      try { d = JSON.parse(localStorage.getItem(POS_KEY) || '{}'); } catch(_) { return; }
      document.querySelectorAll('.icon-item[data-id]').forEach(item => {
        const p = d[item.dataset.id];
        if (!p) return;
        item.style.left      = p.left;
        item.style.top       = p.top;
        item.style.right     = 'auto';
        item.style.bottom    = 'auto';
        item.style.transform = 'none';
      });
    }

    /* ── Restore saved images ── */
    function loadImages() {
      let d;
      try { d = JSON.parse(localStorage.getItem(IMG_KEY) || '{}'); } catch(_) { return; }
      document.querySelectorAll('.icon-item[data-id]').forEach(item => {
        if (d[item.dataset.id]) applyCustomImage(item, d[item.dataset.id]);
      });
    }

    /* ── Drag (mouse + touch) ── */
    function initDrag() {
      const canvas = document.querySelector('.canvas');

      document.querySelectorAll('.icon-item[data-id]').forEach(item => {
        let active = false, dist = 0, sX, sY, oL, oT;

        function startDrag(cx, cy) {
          dist = 0; active = false;
          sX = cx; sY = cy;
          const cr  = canvas.getBoundingClientRect();
          const ir  = item.getBoundingClientRect();
          oL = ir.left - cr.left;
          oT = ir.top  - cr.top;
          // anchor position in px so we can add deltas
          item.style.left      = oL + 'px';
          item.style.top       = oT + 'px';
          item.style.right     = 'auto';
          item.style.bottom    = 'auto';
          item.style.transform = 'none';
          item.style.zIndex    = '50';
          item.classList.add('is-dragging');
        }

        function moveDrag(cx, cy) {
          const dx = cx - sX, dy = cy - sY;
          dist = Math.hypot(dx, dy);
          if (dist < 4) return;
          active = true;
          const maxL = canvas.offsetWidth  - item.offsetWidth;
          const maxT = canvas.offsetHeight - item.offsetHeight;
          item.style.left = clamp(oL + dx, 0, maxL) + 'px';
          item.style.top  = clamp(oT + dy, 0, maxT) + 'px';
        }

        function endDrag() {
          item.style.zIndex = '';
          item.classList.remove('is-dragging');
          if (active) savePos(item);
        }

        /* Mouse */
        item.addEventListener('mousedown', e => {
          if (e.button !== 0 || e.target.closest('.icon-edit-btn')) return;
          e.preventDefault();
          startDrag(e.clientX, e.clientY);
          const move = ev => moveDrag(ev.clientX, ev.clientY);
          const up   = () => { endDrag(); document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
          document.addEventListener('mousemove', move);
          document.addEventListener('mouseup', up);
        });

        /* Block navigation when drag happened */
        item.addEventListener('click', e => { if (dist > 4) e.preventDefault(); });

        /* Touch */
        item.addEventListener('touchstart', e => {
          if (e.target.closest('.icon-edit-btn')) return;
          const t = e.touches[0];
          startDrag(t.clientX, t.clientY);
        }, { passive: true });

        item.addEventListener('touchmove', e => {
          const t = e.touches[0];
          moveDrag(t.clientX, t.clientY);
          if (active) e.preventDefault();
        }, { passive: false });

        item.addEventListener('touchend', endDrag);
      });
    }

    /* ── Edit (replace icon) button ── */
    function initEditButtons() {
      const pencilSVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11,3 L13,5 L5,13 L2,14 L3,11 Z"/>
        <line x1="9.5" y1="4.5" x2="11.5" y2="6.5"/>
      </svg>`;

      document.querySelectorAll('.icon-item[data-id]').forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'icon-edit-btn';
        btn.title = '이미지 교체';
        btn.innerHTML = pencilSVG;

        btn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*';
          input.onchange = ev => {
            const file = ev.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = re => {
              const url = re.target.result;
              applyCustomImage(item, url);
              try {
                const d = JSON.parse(localStorage.getItem(IMG_KEY) || '{}');
                d[item.dataset.id] = url;
                localStorage.setItem(IMG_KEY, JSON.stringify(d));
              } catch(_) {
                alert('이미지가 너무 큽니다. 더 작은 파일을 사용해주세요.');
              }
            };
            reader.readAsDataURL(file);
          };
          input.click();
        });

        item.appendChild(btn);
      });
    }

    /* ── Init ── */
    loadPositions();
    loadImages();
    initDrag();
    initEditButtons();
  </script>
